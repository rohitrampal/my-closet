services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mycloset
      POSTGRES_PASSWORD: mycloset
      POSTGRES_DB: mycloset
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycloset -d mycloset"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mycloset:mycloset@db:5432/mycloset
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-min-16-chars}
      ENV: ${ENV:-dev}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
